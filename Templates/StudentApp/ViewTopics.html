<!DOCTYPE html>
{%load static%}
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Landing page template built with HTML and Bootstrap 4 for presenting training courses, classes, workshops and for convincing visitors to register using the form.">
    <meta name="author" content="Inovatik">

    <!-- OG Meta Tags to improve the way the post looks when you share the page on LinkedIn, Facebook, Google+ -->
	<meta property="og:site_name" content="" /> <!-- website name -->
	<meta property="og:site" content="" /> <!-- website link -->
	<meta property="og:title" content=""/> <!-- title shown in the actual shared post -->
	<meta property="og:description" content="" /> <!-- description shown in the actual shared post -->
	<meta property="og:image" content="" /> <!-- image link, make sure it's jpg -->
	<meta property="og:url" content="" /> <!-- where do you want your post to link to -->
	<meta property="og:type" content="article" />

    <!-- Website Title -->
    <title>Project</title>
    
    <!-- Styles -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,400i,600,700,700i&display=swap" rel="stylesheet">
    <link href="{%static 'css/bootstrap.css'%}" rel="stylesheet">
    <link href="{%static 'css/fontawesome-all.css'%}" rel="stylesheet">
    <link href="{%static 'css/swiper.css'%}" rel="stylesheet">
	<link href="{%static 'css/magnific-popup.css'%}" rel="stylesheet">
	<link href="{%static 'css/styles.css'%}" rel="stylesheet">
	
	<!-- Favicon  -->

</head>
<body data-spy="scroll" data-target=".fixed-top">
    


    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">

        <!-- Text Logo - Use this if you don't have a graphic logo -->
        <!-- <a class="navbar-brand logo-text page-scroll" href="index.html">Corso</a> -->

        <!-- Image Logo -->
        <a class="navbar-brand logo-image" href="index.html">Adaptive Skill Tree Generation</a>
        
        <!-- Mobile Menu Toggle Button -->
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarsExampleDefault" aria-controls="navbarsExampleDefault" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-awesome fas fa-bars"></span>
            <span class="navbar-toggler-awesome fas fa-times"></span>
        </button>
        <!-- end of mobile menu toggle button -->

        <div class="collapse navbar-collapse" id="navbarsExampleDefault">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link page-scroll" href="/user/home">HOME <span class="sr-only">(current)</span></a>
                </li>

                <li class="nav-item">
                    <a class="nav-link page-scroll" href="/user/viewprofile">VIEW PROFILE</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link page-scroll" href="/user/gotoquiz">GOTO QUIZ</a>
                </li>
                  <li class="nav-item">
                    <a class="nav-link page-scroll" href="/user/skillassessment">Skill Performance</a>
                </li>
                 <li class="nav-item">
                    <a class="nav-link page-scroll" href="/user/guidance">Career Guidance</a>
                </li>
                 <li class="nav-item">
                    <a class="nav-link page-scroll" href="/user/skillTree">Skill Tree</a>
                </li>

                  <li class="nav-item">
                    <a class="nav-link page-scroll" href="/#userlogin">LOGOUT</a>
                </li>
            </ul>

        </div>
    </nav> <!-- end of navbar -->
    <!-- end of navigation -->


    <!-- Registration -->
    <div id="adminlogin" class="form-1">
        <div class="container">
            <div class="row">


            </div> <!-- end of row -->
        </div> <!-- end of container -->
    </div> <!-- end of form-1 -->
    <!-- end of registration -->







    <!-- Students -->
    <div class="basic-3" id="userlogin">
        <div class="container">
            <div class="row">
                <div class="col-lg-6">
                    <div class="text-container">
                        <h2>{{sub}} AVAILABLE TOPICS</h2>

                        <p style="color:red">{{msg}}</p>
  <!-- Registration Form -->
                    <div class="form-container">
                        <form id="userlogin1" data-toggle="validator" data-focus="false" action="/user/StartQuiz" method="post">
                            {%csrf_token%}
                            <div class="form-group">
                                <input type="text" class="form-control-input" id="topic" name="subject" value="{{sub}}" readonly>

                                <div class="help-block with-errors"></div>
                            </div>
                             <div class="form-group">
                                 <select class="form-control-input" id="select" name="topic" required>
                                     <option></option>
                                     {{option | safe}}
                                 </select>
                                <label class="label-control" for="rname">Topic name</label>
                                <div class="help-block with-errors"></div>
                            </div>

                            <div class="form-group">
                                <button type="submit" class="form-control-submit-button">SUBMIT</button>
                            </div>

                            <div class="form-message">
                                <div id="rmsgSubmit1" class="h3 text-center hidden"></div>
                            </div>
                        </form>
                    </div> <!-- end of form-container -->
                    <!-- end of registration form -->

                    </div> <!-- end of text-container -->
                </div> <!-- end of col -->
                <div class="col-lg-6">
                    <img class="img-fluid" src="{%static 'we.jpg'%}" alt="alternative">
                </div> <!-- end of col -->
            </div> <!-- end of row -->
        </div> <!-- end of container -->
    </div> <!-- end of basic-3 -->
    <!-- end of students -->











    <!-- Footer -->
    <div class="footer">
        <div class="container">
            <div class="row">
                <div class="col-md-3">

                </div> <!-- end of col -->
                <div class="col-md-3">

                </div> <!-- end of col -->
                <div class="col-md-3">

                <div class="col-md-3">

                </div> <!-- end of col -->
            </div> <!-- end of row -->
        </div> <!-- end of container -->
    </div> <!-- end of footer -->  
    <!-- end of footer -->


    <!-- Copyright -->
    <div class="copyright">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <p class="p-small">Copyright © 2024-2025</p>
                </div> <!-- end of col -->
            </div> <!-- enf of row -->
        </div> <!-- end of container -->
    </div> <!-- end of copyright --> 
    <!-- end of copyright -->
    
    	
    <!-- Scripts -->
    <script src="{%static 'js/jquery.min.js'%}"></script> <!-- jQuery for Bootstrap's JavaScript plugins -->
    <script src="{%static 'js/popper.min.js'%}"></script> <!-- Popper tooltip library for Bootstrap -->
    <script src="{%static 'js/bootstrap.min.js'%}"></script> <!-- Bootstrap framework -->
    <script src="{%static 'js/jquery.easing.min.js'%}"></script> <!-- jQuery Easing for smooth scrolling between anchors -->
    <script src="{%static 'js/jquery.countdown.min.js'%}"></script> <!-- The Final Countdown plugin for jQuery -->
    <script src="{%static 'js/swiper.min.js'%}"></script> <!-- Swiper for image and text sliders -->
    <script src="{%static 'js/jquery.magnific-popup.js'%}"></script> <!-- Magnific Popup for lightboxes -->
    <script src="{%static 'js/validator.min.js'%}"></script> <!-- Validator.js - Bootstrap plugin that validates forms -->
    <script src="{%static 'js/scripts.js'%}"></script> <!-- Custom scripts -->
</body>
</html>
