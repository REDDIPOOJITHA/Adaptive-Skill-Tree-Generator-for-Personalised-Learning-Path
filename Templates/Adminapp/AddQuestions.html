    <!-- Registration -->

        <div class="container">
            <div class="row">


            </div> <!-- end of row -->
        </div> <!-- end of container -->
    </div> <!-- end of form-1 -->

    <!-- Students -->
    <div class="basic-3" id="userlogin">
        <div class="container">
            <div class="row">
                <div class="col-lg-6">
                    <div class="text-container">
                        <h5>ADD QUESTION AND ANSWERS</h5>

                        <p style="color:red">{{msg}}</p>
  <!-- Registration Form -->
                    <div class="form-container">
                        <form id="userlogin1" data-toggle="validator" data-focus="false" action="/AddQAAction" method="post">
                            {%csrf_token%}
                             <div class="form-group">
                                 <select class="form-control-input" id="select" name="subject" required>
                                     <option></option>
                                     {{option | safe}}
                                 </select>
                                <label class="label-control" for="rname">Subject name</label>
                                <div class="help-block with-errors"></div>
                            </div>

                            <div class="form-group">
                                <input type="text" class="form-control-input" id="topic" name="topic" required>
                                <label class="label-control" for="rname">Add Topic From Selected Subject</label>
                                <div class="help-block with-errors"></div>
                            </div>
                            <div class="form-group">
                            <textarea class="form-control-textarea" name="question" id="question" required></textarea>
                            <label class="label-control" for="cmessage">Add Question</label>
                            <div class="help-block with-errors"></div>
                        </div>
                            <div class="form-group">
                                <input type="text" class="form-control-input" id="ans_one" name="ans_one" required>
                            <label class="label-control" for="cmessage">Add 1st Answer</label>
                            <div class="help-block with-errors"></div>
                        </div>
                            <div class="form-group">

                            <input type="text" class="form-control-input" id="ans_two" name="ans_two" required>
                                <label class="label-control" for="cmessage">Add 2nd Answer</label>
                            <div class="help-block with-errors"></div>
                        </div>
                            <div class="form-group">
                            <input type="text" class="form-control-input" id="ans_three" name="ans_three" required>
                            <label class="label-control" for="cmessage">Add 3rd Answer</label>
                            <div class="help-block with-errors"></div>
                        </div>




                           <div class="form-group">
                                 <select class="form-control-input" id="select_ans" name="c_ans" required>
                                     <option></option>
                                     <option>A</option>
                                     <option>B</option>
                                     <option>C</option>

                                 </select>
                                <label class="label-control" for="rname">Select Correct Answers</label>
                                <div class="help-block with-errors"></div>
                            </div>
                            <div class="form-group">
                                 <select class="form-control-input" id="select_anss" name="q_type" required>
                                     <option value=""></option>
                                     <option>Hard</option>
                                     <option>Easy</option>
                                     <option>Average</option>

                                 </select>
                                <label class="label-control" for="rname">Select Question Type</label>
                                <div class="help-block with-errors"></div>
                            </div>



                            <div class="form-group">
                                <button type="submit" class="form-control-submit-button">SUBMIT</button>
                            </div>

                            <div class="form-message">
                                <div id="rmsgSubmit1" class="h3 text-center hidden"></div>
                            </div>
                        </form>
                    </div> <!-- end of form-container -->
                    <!-- end of registration form -->
